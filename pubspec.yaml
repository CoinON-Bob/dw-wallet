name: dw_wallet
description: DW Wallet - 去中心化多链钱包，主网BSC

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ── Web3 / 区块链 ──────────────────────────────────────
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0
  convert: ^3.1.1
  pointycastle: ^3.7.3
  hex: ^0.2.0

  # ── 安全存储 ───────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ── UI ─────────────────────────────────────────────────
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # ── DApp 浏览器 ────────────────────────────────────────
  webview_flutter: ^4.7.0

  # ── 网络请求 ───────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1

  # ── 状态管理 ───────────────────────────────────────────
  provider: ^6.1.2

  # ── 工具 ───────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
